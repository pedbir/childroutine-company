services:
  workspace:
    image: mcr.microsoft.com/devcontainers/javascript-node:22
    volumes:
      # Workspace
      - ..:/workspaces/company:cached

      # Paperclip data — persists agent workspaces, storage, secrets
      # (database now lives in the postgres service)
      - paperclip-data:/home/node/.paperclip

      # Claude Code config and auth
      - ${HOME}/.claude:/home/node/.claude:cached
      - ${HOME}/.claude.json:/home/node/.claude.json:cached

      # SSH keys for git (read-only)
      - ${HOME}/.ssh:/home/node/.ssh:ro
    env_file:
      - ../.env.secrets
    environment:
      - PAPERCLIP_HOME=/home/node/.paperclip
      - DATABASE_URL=postgres://paperclip:paperclip@db:5432/paperclip
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    networks:
      - paperclip-net

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - paperclip-net

volumes:
  paperclip-data:
  postgres-data:

networks:
  paperclip-net:
