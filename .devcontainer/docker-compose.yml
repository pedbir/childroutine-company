services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
      # Mount host SSH keys for git operations (read-only)
      - ~/.ssh:/home/node/.ssh:ro
      # Mount host Claude Code config (for session/auth persistence)
      - ~/.claude:/home/node/.claude
    command: sleep infinity
    env_file:
      # Load secrets from a local .env.secrets file (git-ignored)
      - path: ../.env.secrets
        required: false
    environment:
      - NODE_ENV=development
      # Leave DATABASE_URL unset to use embedded PGlite (no external DB needed)
      # Uncomment below to use the PostgreSQL container instead:
      # - DATABASE_URL=postgres://paperclip:paperclip@db:5432/paperclip
    ports:
      - "3100:3100"
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  node_modules:
  pgdata:
